# version: "3.8"

services:
  postgres:
    image: postgres:16.3
    container_name: postgres_ms
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_ms:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  redis:
    image: redis:7.4
    container_name: redis_ms
    restart: always
    env_file:
      - .env
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis_ms:/data

  neo4j:
    image: neo4j:5.26.26
    container_name: neo4j_ms
    hostname: neo4j
    env_file:
      - .env
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - neo4j_ms:/data
      - ./import:/var/lib/neo4j/import
      - ./plugins:/var/lib/neo4j/plugins
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_allow__upgrade=true
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7474']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.8
    container_name: zookeeper_ms
    env_file:
      - .env
    ports:
      - '${HOST_ZOOKEEPER_PORT}:2181'
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.8
    container_name: kafka_ms
    depends_on:
      - zookeeper
    env_file:
      - .env
    ports:
      - '${HOST_KAFKA_PORT}:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper_ms:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka_ms:29092,PLAINTEXT_HOST://localhost:${HOST_KAFKA_PORT}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - '${MINIO_PORT}:9000' # API
      - '${MINIO_CONSOLE_PORT}:9001' # Web console
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_ms:
  redis_ms:
  neo4j_ms:
  zookeeper_ms:
  kafka_ms:
  minio_data:

logging:
  level:
    # disable log of InitializeUserDetailsBeanManagerConfigurer
    '[org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer]': ERROR

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:thaca-auth/.env[.properties]

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/thaca?options=-c%20timezone=UTC}
    username: ${POSTGRES_USERNAME:root}
    password: ${POSTGRES_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS auth; CREATE SCHEMA IF NOT EXISTS admin;

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

outbox:
  scheduler:
    delay: ${OUTBOX_SCHEDULER_DELAY:5000}

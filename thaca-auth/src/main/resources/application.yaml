server:
  port: 1001

  servlet:
    context-path: /auth

spring:
  application:
    name: auth

  profiles:
    active: dev
    include: framework

  output:
    ansi:
      enabled: always

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 600000
      pool-name: HikariCP

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      '[hibernate.format_sql]': true

  liquibase:
    enabled: true
    change-log: liquibase/changelog-master.xml

server:
  port: 1002

  servlet:
    context-path:

spring:
  application:
    name: thaca-cms

  profiles:
    active: dev
    include: core,blocking

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      '[hibernate.format_sql]': true
      '[hibernate.default_schema]': auth

  output:
    ansi:
      enabled: always

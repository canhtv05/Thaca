server:
  port: 1002

  servlet:
    context-path:

spring:
  application:
    name: thaca-cms

  profiles:
    active: dev
    include: core,blocking

  output:
    ansi:
      enabled: always

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 600000
      pool-name: HikariCP
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS cms

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      '[hibernate.format_sql]': true
      '[hibernate.default_schema]': cms

  liquibase:
    enabled: true
    change-log: liquibase/changelog-master.xml
    default-schema: cms
    liquibase-schema: cms

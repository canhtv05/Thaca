logging:
  level:
    '[root]': WARN
    '[com.thaca]': INFO
    '[org.springframework]': WARN

management:
  health:
    mail:
      enabled: false

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:thaca-notification/.env[.properties]

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/thaca?options=-c%20timezone=UTC}
    username: ${POSTGRES_USERNAME:root}
    password: ${POSTGRES_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS notification

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_NOTIFICATION_CONSUMER_GROUP_ID:thaca-notification-group}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  liquibase:
    change-log: classpath:liquibase/changelog-master.xml
    default-schema: notification
    enabled: true

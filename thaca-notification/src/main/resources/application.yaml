server:
  port: 1003

  servlet:
    context-path:

spring:
  application:
    name: thaca-notification

  profiles:
    active: core
    include: blocking,dev

  output:
    ansi:
      enabled: always

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 600000
      pool-name: HikariCP
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS notification

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      '[hibernate.format_sql]': true
      '[hibernate.default_schema]': notification

  liquibase:
    enabled: true
    change-log: liquibase/changelog-master.xml
    default-schema: notification
    liquibase-schema: notification

  messages:
    basename: i18n/messages
    encoding: UTF-8

app:
  base-url: http://localhost:1003

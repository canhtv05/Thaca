<div
  class="layout-wrapper"
  [class.sidebar-collapsed]="layoutService.isSidebarCollapsed()"
  [class.mobile-menu-active]="layoutService.isMobileMenuActive()"
>
  <!-- Sidebar -->
  <aside class="layout-sidebar">
    <app-sidebar></app-sidebar>
  </aside>

  <!-- Mobile overlay -->
  @if (layoutService.isMobileMenuActive()) {
    <div class="mobile-overlay" (click)="layoutService.closeMobileMenu()"></div>
  }

  <!-- Main content area -->
  <div class="layout-main">
    <app-header-layout></app-header-layout>
    <div class="layout-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>

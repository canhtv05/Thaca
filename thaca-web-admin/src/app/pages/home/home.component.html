<div class="flex min-h-[60vh] flex-col items-center justify-center gap-8 px-4 py-12 text-center">
  <div class="space-y-2">
    <h1 class="text-2xl font-semibold text-foreground">Trang chủ</h1>
    <p class="max-w-md text-muted-foreground">
      Giao diện dùng token CSS (oklch) + variant
      <code class="rounded bg-muted px-1.5 py-0.5 text-sm">dark:</code>
      trên
      <code class="rounded bg-muted px-1.5 py-0.5 text-sm">.dark</code>
    </p>
  </div>

  <button
    type="button"
    (click)="toggleTheme()"
    class="linear-1 inline-flex items-center gap-2 rounded-xl px-5 py-2.5 text-sm font-medium text-primary-foreground shadow-md"
  >
    @if (theme.theme() === 'dark') {
      <span>Chuyển giao diện sáng</span>
    } @else {
      <span>Chuyển giao diện tối</span>
    }
  </button>

  <p class="text-xs text-muted-foreground">
    Đang dùng:
    <strong class="text-foreground">{{ theme.theme() === 'dark' ? 'Dark' : 'Light' }}</strong>
    — lưu trong localStorage
  </p>
</div>

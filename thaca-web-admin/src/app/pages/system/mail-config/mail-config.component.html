<div class="flex flex-col gap-4 w-full">
  <app-breadcrumb [title]="'mail_config.title' | translate" [items]="breadcrumbItems" />

  <app-page-hint variant="primary" icon="pi pi-envelope" [title]="'mail_config.tab.system' | translate">
    <span [innerHTML]="'mail_config.notice.fallback' | translate"></span>
  </app-page-hint>

  <thaca-tabs [value]="activeTab()" (valueChange)="onTabChange($any($event))">
    <thaca-tab value="system" [label]="'mail_config.tab.system' | translate" icon="pi pi-shield">
      <form [formGroup]="configForm" class="pt-4">
        <div class="card flex flex-col gap-4">
          @if (!systemConfig()) {
            <div class="flex items-center justify-end">
              <span class="thaca-badge thaca-badge-neutral">
                {{ 'mail_config.state.no_system_config' | translate }}
              </span>
            </div>
          }

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="form-control">
              <thaca-input
                type="text"
                [label]="'mail_config.form.host' | translate"
                formControlName="host"
                placeholder="smtp.gmail.com"
                [required]="true"
              />
              <validation-message [control]="configForm.get('host')"></validation-message>
            </div>

            <div class="form-control">
              <thaca-dropdown
                [label]="'mail_config.form.port' | translate"
                formControlName="port"
                [options]="portOptions"
                [placeholder]="'mail_config.form.port_placeholder' | translate"
                [required]="true"
              />
              <validation-message [control]="configForm.get('port')"></validation-message>
            </div>

            <div class="form-control">
              <thaca-input
                [label]="'mail_config.form.username' | translate"
                formControlName="username"
                placeholder="system@thaca.io"
                [required]="true"
              />
              <validation-message [control]="configForm.get('username')"></validation-message>
            </div>

            <div class="form-control">
              <thaca-input
                type="password"
                [label]="'mail_config.form.password' | translate"
                formControlName="password"
                placeholder="••••••••"
                [required]="!systemConfig()"
              />
              <validation-message [control]="configForm.get('password')"></validation-message>
            </div>

            <div class="form-control">
              <thaca-input
                type="text"
                [label]="'mail_config.form.sender_name' | translate"
                formControlName="fromName"
                placeholder="Thaca System"
              />
              <validation-message [control]="configForm.get('fromName')"></validation-message>
            </div>

            <div class="form-control">
              <thaca-input
                type="email"
                [label]="'mail_config.form.sender_email' | translate"
                formControlName="fromEmail"
                placeholder="system@thaca.io"
              />
              <validation-message [control]="configForm.get('fromEmail')"></validation-message>
            </div>

            <div
              class="flex flex-col col-span-full md:col-span-2 gap-4 border-t border-t-border pt-4"
            >
              <div class="card-secondary">
                <div class="flex items-center justify-between">
                  <label for="isStarttls">
                    <div class="text-sm font-bold">
                      {{ 'mail_config.form.tls_toggle' | translate }}
                    </div>
                    <div class="text-xs">
                      {{ 'mail_config.form.tls_desc' | translate }}
                    </div>
                  </label>
                  <thaca-switch
                    formControlName="isStarttls"
                    inputId="isStarttls"
                    name="isStarttls"
                  />
                </div>
              </div>

              <div class="card-secondary">
                <div class="flex items-center justify-between">
                  <label for="isAuth">
                    <div class="text-sm font-bold">
                      {{ 'mail_config.form.enable_auth' | translate }}
                    </div>
                    <div class="text-xs">
                      {{ 'mail_config.form.enable_auth_desc' | translate }}
                    </div>
                  </label>
                  <thaca-switch formControlName="isAuth" inputId="isAuth" name="isAuth" />
                </div>
              </div>
              <div class="card-secondary">
                <div class="flex items-center justify-between">
                  <label for="isDefault">
                    <div class="text-sm font-bold">
                      {{ 'mail_config.form.default_fallback_toggle' | translate }}
                    </div>
                    <div class="text-xs">
                      {{ 'mail_config.form.default_fallback_desc' | translate }}
                    </div>
                  </label>
                  <thaca-switch formControlName="isDefault" inputId="isDefault" name="isDefault" />
                </div>
              </div>
            </div>
          </div>

          <div
            class="flex flex-col sm:flex-row gap-4 justify-between items-stretch sm:items-center"
          >
            <div>
              <thaca-button
                type="button"
                [loading]="isLoading()"
                (click)="testConnection()"
                [disabled]="configForm.invalid"
                variant="outline"
              >
                  <i class="pi pi-bolt mr-2" aria-hidden="true"></i>
                {{ 'mail_config.button.test_connection' | translate }}
              </thaca-button>
            </div>

            <div class="flex gap-4 justify-end">
              <thaca-button type="button" (click)="resetForm()" variant="ghost">
                {{ 'common.button.cancel' | translate }}
              </thaca-button>
              <thaca-button
                type="button"
                (click)="saveConfig()"
                variant="primary"
                class="**:text-white"
                [loading]="saving()"
                [disabled]="saving() || configForm.invalid"
              >
                {{
                  systemConfig()
                    ? ('common.button.save' | translate)
                    : ('mail_config.button.create_config' | translate)
                }}
              </thaca-button>
            </div>
          </div>
        </div>
      </form>
    </thaca-tab>

    <thaca-tab value="tenant" [label]="'mail_config.tab.tenant' | translate" icon="pi pi-users">
      <div class="pt-4"></div>
    </thaca-tab>
  </thaca-tabs>
</div>

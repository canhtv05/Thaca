<div [class]="cardClass + ' flex-row! items-start gap-3 p-4 text-sm'">
  <i [class]="resolvedIcon + ' text-lg shrink-0 mt-0.5'"></i>
  <div class="flex flex-col gap-1 min-w-0">
    @if (title) {
      <span class="font-semibold leading-snug">{{ title }}</span>
    }
    <span class="leading-relaxed opacity-90"><ng-content /></span>
  </div>
</div>

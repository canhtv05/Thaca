<div
  class="thaca-sw"
  [ngClass]="hostClasses"
  role="switch"
  [attr.aria-label]="ariaLabel || label || null"
  [attr.aria-checked]="state === 'indeterminate' ? 'mixed' : checked"
  [attr.aria-disabled]="state === 'disabled' ? true : null"
  (click)="onHostClick($event)"
>
  @if (state !== 'loading' && state !== 'indeterminate') {
    <input
      type="checkbox"
      [id]="inputId"
      [attr.name]="name || inputId"
      [checked]="checked"
      [disabled]="state === 'disabled'"
      (change)="onInputChange($event)"
      tabindex="-1"
    />
  }

  <span class="sw-track" aria-hidden="true">
    @if (state === 'loading') {
      <span class="sw-spinner">
        <span class="sw-spinner-ring"></span>
      </span>
    } @else {
      <span class="sw-thumb"></span>
    }
  </span>

  @if (label) {
    <span class="sw-label-text">{{ label }}</span>
  }
</div>

<main class="flex flex-col lg:flex-row items-center justify-center h-screen">
  <div class="fixed top-4 right-4" clickOutside (clickOutside)="showDropdown = false">
    <div
      class="rounded-md px-2 relative py-1.5 min-w-[110px] bg-card border border-border flex items-center justify-start gap-2 cursor-pointer"
      (click)="onShowDropdown()"
    >
      <ng-icon [name]="APP_CONFIG_ICONS['solarGlobalBoldDuotone'].name" size="16" />
      <p class="text-sm font-medium">
        {{ currentLang() === 'vi' ? 'Tiếng Việt' : 'English' }}
      </p>
    </div>
    @if (showDropdown) {
      <div
        class="flex flex-col gap-2 p-1 absolute w-[calc(100%+30px)] top-[calc(100%+4px)] right-0 rounded-md bg-background border border-border [&>div]:hover:bg-accent [&>div]:hover:rounded-md [&>div]:hover:text-accent-foreground"
        (click)="$event.stopPropagation()"
      >
        <div
          class="flex items-center justify-start gap-2 cursor-pointer px-2 py-1 w-full"
          (click)="onChangeLang('vi')"
        >
          @if (currentLang() === 'vi') {
            <span
              class="relative inline-flex size-2 rounded-full bg-emerald-400 shadow-[0_0_8px_#50fa7b]"
            ></span>
          } @else {
            <span class="relative inline-flex size-2 rounded-full bg-gray-400"></span>
          }
          <img src="assets/media/flags/vn.webp" alt="" class="size-5" role="presentation" />
          <p class="text-sm font-medium">Tiếng Việt</p>
        </div>
        <div
          class="flex items-center justify-start gap-2 cursor-pointer px-2 py-1 w-full"
          (click)="onChangeLang('en')"
        >
          @if (currentLang() === 'en') {
            <span
              class="relative inline-flex size-2 rounded-full bg-emerald-400 shadow-[0_0_8px_#50fa7b]"
            ></span>
          } @else {
            <span class="relative inline-flex size-2 rounded-full bg-gray-400"></span>
          }
          <img src="assets/media/flags/uk.webp" alt="" class="size-5" role="presentation" />
          <p class="text-sm font-medium">English</p>
        </div>
      </div>
    }
  </div>
  <div class="order-1 lg:w-auto w-full flex justify-center items-center">
    <div class="w-full card rounded-xl p-0"><ng-content></ng-content></div>
  </div>
  <!-- <div class="hidden lg:block flex-1 order-1 lg:order-2">
    <img
      src="assets/media/imgs/bg-login.png"
      alt="Login background"
      class="w-[calc(100%-20px)] rounded-md h-[95vh] object-cover"
    />
  </div> -->
</main>

<div class="page-container flex flex-col gap-4">
  <app-breadcrumb
    [title]="'menu.system_user_management'"
    [items]="breadcrumbItems"
  ></app-breadcrumb>
  <app-data-table [config]="tableConfig" (onAction)="handleAction($event)">
    <ng-template #searchTemplate>
      <div
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-3 place-content-end place-items-end"
      >
        <thaca-input
          class="w-full"
          [label]="'system_user.username' | translate"
          [(ngModel)]="filter().username"
          [placeholder]="'system_user.username_placeholder' | translate"
        ></thaca-input>
        <thaca-input
          class="w-full"
          [label]="'system_user.fullname' | translate"
          [(ngModel)]="filter().fullname"
          [placeholder]="'system_user.fullname_placeholder' | translate"
        ></thaca-input>
        <thaca-input
          class="w-full"
          [label]="'system_user.email' | translate"
          [(ngModel)]="filter().email"
          [placeholder]="'system_user.email_placeholder' | translate"
        ></thaca-input>
        <thaca-dropdown
          class="w-full"
          [label]="'system_user.is_activated' | translate"
          [options]="activatedOptions"
          [(ngModel)]="filter().isActivated"
        ></thaca-dropdown>
        <thaca-dropdown
          class="w-full"
          [label]="'system_user.is_locked' | translate"
          [options]="lockedOptions"
          [(ngModel)]="filter().isLocked"
        ></thaca-dropdown>

        <thaca-button class="w-full" (click)="onSearch()">
          <span class="text-white"> {{ 'common.button.search' | translate }} </span>
        </thaca-button>
      </div>
    </ng-template>
    <ng-template #headerActions>
      <div class="flex justify-end items-center gap-4">
        <thaca-button variant="outline" (click)="onExport()">
          {{ 'common.button.export' | translate }}
        </thaca-button>
        <thaca-button (click)="onCreate()">
          <span class="text-white"> {{ 'common.button.create' | translate }} </span>
        </thaca-button>
      </div>
    </ng-template>
  </app-data-table>
</div>

<thaca-modal
  #userModal
  [title]="
    (userForm.value.id ? 'system_user.modal.update_title' : 'system_user.modal.create_title')
      | translate
  "
  [formGroup]="userForm"
  size="lg"
  [disableSubmit]="isUnchanged()"
  [loading]="isLoading()"
  (onSubmit)="onSubmit()"
>
  <div class="grid grid-cols-1 gap-4">
    <div class="grid grid-cols-2 gap-4">
      <div class="form-control">
        <thaca-input
          formControlName="username"
          [label]="'system_user.username' | translate"
          [required]="true"
        ></thaca-input>
        <validation-message [control]="userForm.get('username')"></validation-message>
      </div>
      <div class="form-control">
        <thaca-input
          formControlName="fullname"
          [label]="'system_user.fullname' | translate"
          [required]="true"
        ></thaca-input>
        <validation-message [control]="userForm.get('fullname')"></validation-message>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="form-control">
        <thaca-input
          formControlName="email"
          [label]="'system_user.email' | translate"
          [required]="true"
        ></thaca-input>
        <validation-message [control]="userForm.get('email')"></validation-message>
      </div>
      <div class="form-control">
        <thaca-input
          formControlName="password"
          [label]="'system_user.password' | translate"
          [type]="'password'"
          [required]="!userForm.value.id"
        ></thaca-input>
        <validation-message [control]="userForm.get('password')"></validation-message>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="form-control">
        <thaca-dropdown
          formControlName="tenantId"
          [label]="'system_user.tenant' | translate"
          [options]="tenantOptions()"
          [appendTo]="'body'"
        ></thaca-dropdown>
        <validation-message [control]="userForm.get('tenantId')"></validation-message>
      </div>
      <div class="form-control">
        <thaca-dropdown
          formControlName="roleCodes"
          [label]="'system_user.roles' | translate"
          [options]="roleOptions()"
          [multiple]="true"
          [appendTo]="'body'"
        ></thaca-dropdown>
        <validation-message [control]="userForm.get('roleCodes')"></validation-message>
      </div>
    </div>

    <div class="flex gap-4">
      <div class="flex items-center gap-2">
        <input type="checkbox" formControlName="isActivated" id="isActivated" />
        <label for="isActivated">{{ 'system_user.is_activated' | translate }}</label>
      </div>
      <div class="flex items-center gap-2">
        <input type="checkbox" formControlName="isLocked" id="isLocked" />
        <label for="isLocked">{{ 'system_user.is_locked' | translate }}</label>
      </div>
      <div class="flex items-center gap-2">
        <input type="checkbox" formControlName="isSuperAdmin" id="isSuperAdmin" />
        <label for="isSuperAdmin">{{ 'system_user.is_super_admin' | translate }}</label>
      </div>
    </div>
  </div>
</thaca-modal>

<thaca-modal #reasonModal [title]="'system_user.modal.reason_title' | translate" size="lg">
  <div class="flex flex-col gap-4">
    <thaca-input
      [(ngModel)]="lockReason"
      [label]="'system_user.lock_reason' | translate"
      [required]="true"
    ></thaca-input>
    <div class="flex justify-end gap-2 pt-4 border-t">
      <thaca-button variant="secondary" (click)="reasonModal.hide()">
        <span class="text-white"> {{ 'common.button.cancel' | translate }} </span>
      </thaca-button>
      <thaca-button variant="primary" (click)="confirmLockUnlock()" [disabled]="!lockReason">
        <span class="text-white"> {{ 'common.button.confirm' | translate }} </span>
      </thaca-button>
    </div>
  </div>
</thaca-modal>

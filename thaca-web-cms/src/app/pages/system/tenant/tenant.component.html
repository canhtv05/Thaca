<div class="flex flex-col gap-4 w-full">
  <app-breadcrumb [title]="'menu.tenant_management'" [items]="breadcrumbItems"></app-breadcrumb>
  <app-data-table [config]="tableConfig" (onAction)="handleAction($event)">
    <ng-template #searchTemplate>
      <div
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3 place-content-end place-items-end"
      >
        <thaca-input
          [(ngModel)]="filter().code"
          [placeholder]="'tenant.code' | translate"
          (onEnter)="onSearch()"
          class="w-full"
          [label]="'tenant.code' | translate"
        ></thaca-input>
        <thaca-input
          [(ngModel)]="filter().name"
          [placeholder]="'tenant.name' | translate"
          (onEnter)="onSearch()"
          class="w-full"
          [label]="'tenant.name' | translate"
        ></thaca-input>
        <thaca-dropdown
          [(ngModel)]="filter().planId"
          [options]="planOptions()"
          [placeholder]="'tenant.plan' | translate"
          (onChange)="onSearch()"
          class="w-full"
          [label]="'tenant.plan' | translate"
        ></thaca-dropdown>
        <thaca-dropdown
          [(ngModel)]="filter().status"
          [options]="statusOptions"
          [placeholder]="'tenant.status' | translate"
          (onChange)="onSearch()"
          class="w-full"
          [label]="'tenant.status' | translate"
        ></thaca-dropdown>
        <thaca-button (click)="onSearch()" variant="primary" size="md" class="w-full">
          <span class="text-white">{{ 'common.button.search' | translate }}</span>
        </thaca-button>
      </div>
    </ng-template>
    <ng-template #headerActions>
      <div class="flex justify-end items-center gap-4">
        <thaca-button size="md" variant="secondary" (click)="onExport()">
          <span class="text-foreground"> {{ 'common.button.export' | translate }} </span>
        </thaca-button>
        <thaca-button (click)="onCreate()">
          <span class="text-white">{{ 'common.button.create' | translate }}</span>
        </thaca-button>
      </div>
    </ng-template>
  </app-data-table>
</div>

<thaca-modal
  #tenantModal
  size="lg"
  [title]="
    (tenantForm.get('id')?.value ? 'tenant.actions.edit' : 'tenant.actions.create') | translate
  "
  [formGroup]="tenantForm"
  [disableSubmit]="isUnchanged()"
  [loading]="isLoading()"
  (onSubmit)="onSubmit()"
>
  <div class="grid grid-cols-1 gap-4 mt-2">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="form-control">
        <thaca-input
          [label]="'tenant.code' | translate"
          [required]="true"
          formControlName="code"
          [placeholder]="'tenant.code' | translate"
        ></thaca-input>
        <validation-message
          [control]="tenantForm.get('code')"
          [customMessages]="{
            pattern: 'tenant.validation.codePattern',
          }"
        ></validation-message>
      </div>
      <div class="form-control">
        <thaca-input
          [label]="'tenant.name' | translate"
          [required]="true"
          formControlName="name"
          [placeholder]="'tenant.name' | translate"
        ></thaca-input>
        <validation-message [control]="tenantForm.get('name')"></validation-message>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="form-control">
        <thaca-input
          [label]="'tenant.domain' | translate"
          formControlName="domain"
          [placeholder]="'tenant.domain' | translate"
        ></thaca-input>
      </div>
      <div class="form-control">
        <thaca-input
          [label]="'tenant.contact_email' | translate"
          formControlName="contactEmail"
          [placeholder]="'tenant.contact_email' | translate"
        ></thaca-input>
        <validation-message [control]="tenantForm.get('contactEmail')"></validation-message>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="form-control">
        <thaca-dropdown
          [label]="'tenant.plan' | translate"
          [required]="true"
          formControlName="planId"
          [options]="planOptions()"
          [placeholder]="'tenant.plan' | translate"
          appendTo="body"
        ></thaca-dropdown>
        <validation-message [control]="tenantForm.get('planId')"></validation-message>
      </div>
      <div class="form-control">
        <thaca-datepicker
          [label]="'tenant.expires_at' | translate"
          formControlName="expiresAt"
          [placeholder]="'tenant.expires_at' | translate"
          appendTo="body"
          [minDate]="minDate"
        ></thaca-datepicker>
      </div>
      <div class="form-control">
        <thaca-dropdown
          [label]="'tenant.status' | translate"
          [required]="true"
          formControlName="status"
          [options]="statusOptions.slice(1)"
          [placeholder]="'tenant.status' | translate"
          appendTo="body"
        ></thaca-dropdown>
        <validation-message [control]="tenantForm.get('status')"></validation-message>
      </div>
    </div>

    <div class="form-control">
      <thaca-textarea
        [label]="'tenant.logo_url' | translate"
        formControlName="logoUrl"
        [placeholder]="'tenant.logo_url' | translate"
        [rows]="2"
      ></thaca-textarea>
    </div>
  </div>
</thaca-modal>

<div class="card">
  <div class="flex items-center mb-4">
    <div class="w-1 h-5 bg-primary mr-2 rounded"></div>
    <h3 class="m-0 text-sm font-bold">
      {{ 'common.audit' | translate }}
    </h3>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    <thaca-input
      [label]="'common.createdBy' | translate"
      [ngModel]="audit.createdBy"
      [disabled]="true"
    ></thaca-input>
    <thaca-input
      [label]="'common.createdAt' | translate"
      [ngModel]="audit.createdAt"
      [disabled]="true"
    ></thaca-input>
    <thaca-input
      [label]="'common.updatedBy' | translate"
      [ngModel]="audit.updatedBy"
      [disabled]="true"
    ></thaca-input>
    <thaca-input
      [label]="'common.updatedAt' | translate"
      [ngModel]="audit.updatedAt"
      [disabled]="true"
    ></thaca-input>
  </div>
</div>

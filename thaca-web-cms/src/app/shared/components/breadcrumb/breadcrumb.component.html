<div class="flex flex-col gap-1 card w-full rounded-md px-4">
  <div class="flex justify-between items-center">
    <div class="flex items-center gap-2">
      @if (showBack) {
        <button
          type="button"
          class="bc-back-btn"
          (click)="goBack()"
          [attr.aria-label]="'common.button.back' | translate"
        >
          <i class="pi pi-arrow-left"></i>
        </button>
      }
      <h1 class="text-sm font-bold">{{ title | translate }}</h1>
    </div>
  </div>
  <p-breadcrumb [model]="items" [home]="home">
    <ng-template #item let-item>
      <a class="cursor-pointer" [routerLink]="item.routerLink || item.url">
        <i [class]="item.icon"></i>
        {{ item.label | translate }}
      </a>
    </ng-template>
  </p-breadcrumb>
</div>
